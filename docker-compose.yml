  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      provenance: false
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env.dev
    environment:
      REDIS_URL: "redis:6379"
    volumes:
      - ./backend:/app
      - go_modules:/root/go/pkg/mod
      - go_build:/root/.cache/go-build
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped


volumes:
  # postgres_data:
  redis_data:
  go_modules:
  go_build:
